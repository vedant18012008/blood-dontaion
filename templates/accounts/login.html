{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header"><h4 class="mb-0">Login</h4></div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex justify-content-between align-items-center">
                        <button class="btn btn-brand" type="submit">Login</button>
                        <a href="{% url 'accounts:password_reset' %}" class="small">Forgot password?</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
